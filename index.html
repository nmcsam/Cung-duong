<script>
const ICONS = ['🌸','🕯️','📿','🏮','🌿','🍃','💐','🪷','🫙','📦','🏗️','🎁','🛕','📚','🌾','💧','🧧','🎋','🪔','⛩️'];
const MONTHS_VN = ['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
const DEFAULT_CATS = [
  {id:'y-phuc',   name:'Y phục',    icon:'🧥'},
  {id:'vat-thuc', name:'Vật thực',  icon:'🍚'},
  {id:'sang-toa', name:'Sàng tọa',  icon:'🛏️'},
  {id:'duoc-pham',name:'Dược phẩm', icon:'💊'},
];
const SK = 'cd_data_v3', CK = 'cd_cats_v1', TK = 'cd_thien_v3';
let data={}, cats=[], thien={};
let curYear=new Date().getFullYear(), curMonth=new Date().getMonth(), thienYear=new Date().getFullYear(), openDay=null;
let selectedIcon='🌸';
function load(){
  try{ data=JSON.parse(localStorage.getItem(SK)||'{}'); }catch{data={};}
  try{ cats=JSON.parse(localStorage.getItem(CK)||'null')||DEFAULT_CATS; }catch{cats=DEFAULT_CATS;}
  try{ thien=JSON.parse(localStorage.getItem(TK)||'{}'); }catch{thien={};}
}
function saveData(){ localStorage.setItem(SK,JSON.stringify(data)); }
function saveCats(){ localStorage.setItem(CK,JSON.stringify(cats)); }
function saveThien(){ localStorage.setItem(TK,JSON.stringify(thien)); }
function syncData(){
  const validIds = cats.map(c=>c.id);
  let changed = false;
  Object.keys(data).forEach(mk=>{
    Object.keys(data[mk]).forEach(day=>{
      const dd = data[mk][day];
      if(!dd||typeof dd!=='object') return;
      Object.values(dd).forEach(slot=>{
        if(slot&&slot.catId&&!validIds.includes(slot.catId)){slot.catId=null;changed=true;}
      });
    });
  });
  if(changed) saveData();
  renderMonth(); renderYear(); renderThien(); updateGrandTotal();
  const btn = event.currentTarget;
  btn.textContent='✓ Xong'; btn.style.background='#5C3D00';
  setTimeout(()=>{ btn.textContent='🔄 Đồng bộ'; btn.style.background='#8B6914'; },1500);
}
function resetAll(){
  ['cd_data_v2','cd_cats_v1','cd_thien_v2','cd_data_v3','cd_thien_v3',
   'cung_duong_data_v1','cung_duong_cats_v1','cung_duong_thien_v1']
    .forEach(k=>localStorage.removeItem(k));
  data={}; cats=DEFAULT_CATS; thien={};
  saveCats(); renderAll();
}

// ── PATCH 1: fmtInput using loop (reliable on all Android) ──
function fmtInput(val){
  if(!val) return '';
  const s = String(val).replace(/[^0-9]/g,'');
  if(!s) return '';
  const n = parseInt(s);
  if(isNaN(n)||n===0) return '';
  let r='', str=n.toString(), len=str.length;
  for(let i=0;i<len;i++){
    if(i>0&&(len-i)%3===0) r+=',';
    r+=str[i];
  }
  return r;
}
function updateSlotAmount(mk,day,si,input){
  const raw = input.value.replace(/[^0-9]/g,'');
  const fmt = fmtInput(raw);
  input.value = fmt;
  input.setSelectionRange(fmt.length, fmt.length);
  updateSlot(mk,day,si,'amount',raw);
}

function fmtVND(n){ return (!n||isNaN(n))?'': Number(n).toLocaleString('vi-VN')+' đ'; }
function parseAmt(s){ return parseInt(String(s||'').replace(/[^\d]/g,''))||0; }
function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
function mKey(y,m){ return y+'-'+String(m+1).padStart(2,'0'); }
function dayTotal(d){
  if(!d||typeof d!=='object') return 0;
  return Object.values(d).reduce((s,slot)=>{
    if(slot&&typeof slot==='object'&&slot.amount) return s+parseAmt(slot.amount);
    return s;
  },0);
}
function monthTotal(mk){ return Object.values(data[mk]||{}).reduce((s,d)=>s+dayTotal(d),0); }
function grandTotal(){ return Object.keys(data).reduce((s,mk)=>s+monthTotal(mk),0); }
function catMonthTotal(catId,mk){
  const md=data[mk]||{}; let s=0;
  Object.values(md).forEach(dd=>{
    if(!dd||typeof dd!=='object') return;
    Object.values(dd).forEach(slot=>{
      if(slot&&typeof slot==='object'&&slot.catId===catId&&slot.amount) s+=parseAmt(slot.amount);
    });
  });
  return s;
}
function catYearTotal(catId,y){ return Array.from({length:12},(_,i)=>catMonthTotal(catId,mKey(y,i))).reduce((a,b)=>a+b,0); }
function catAllTotal(catId){ return Object.keys(data).reduce((s,mk)=>s+catMonthTotal(catId,mk),0); }

function renderMonthSummary(mk,md,tot,cnt){
  const el=document.getElementById('month-summary');
  if(tot<=0){el.innerHTML='';return;}
  // Build per-cat item list
  const catItems={};
  Object.keys(md).sort((a,b)=>Number(a)-Number(b)).forEach(day=>{
    const dd=md[day];
    if(!dd||typeof dd!=='object') return;

    Object.keys(dd).forEach(si=>{
      const slot=dd[si];
      if(!slot||typeof slot!=='object'||!slot.catId||!slot.amount) return;
      const key=day+'-'+si;
      if(seen[key]) return; seen[key]=1;
      const amt=parseAmt(slot.amount); if(!amt) return;
      if(!catItems[slot.catId]) catItems[slot.catId]=[];
      catItems[slot.catId].push({day:parseInt(day),note:slot.note||'',place:slot.place||'',amount:amt});
    });
  });
  // Cumulative up to this month
  let gt=0;
  Object.keys(data).forEach(mk2=>{ if(mk2<=mk) gt+=monthTotal(mk2); });

        </div>
        ${items.map(item=>`<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0 4px 12px;border-bottom:1px dashed #E8D8A0;">
          <div style="flex:1;font-size:12px;">
            <span style="font-weight:700;color:#8B6914;">Ngày ${item.day}</span>
            ${item.place?`<span style="color:#A0805A;"> · ${item.place}</span>`:''}
            ${item.note?`<div style="color:#888;font-style:italic;font-size:11px;">${item.note}</div>`:''}
          </div>
          <span style="font-size:12px;font-weight:700;color:#5C3D00;margin-left:8px;white-space:nowrap;">${fmtVND(item.amount)}</span>
        </div>`).join('')}
      </div>`;
    }).join('')}
    <div class="summary-total-row"><span>Tổng cúng dường tháng</span><span>${fmtVND(tot)}</span></div>
  </div>`:'';
  el.innerHTML=`<div class="summary-box">
    <div class="summary-title">🪷 TỔNG KẾT ${mn.toUpperCase()} ${curYear}</div>

    <div class="summary-count">${cnt} ngày cúng dường trong tháng</div>
    ${catHTML}
    <div class="summary-alltime">
      <span>Tổng cộng dồn đến ${mn}</span>
      <span>${fmtVND(gt)}</span>

    </div>
  </div>`;
}

function renderThienChart(){

    const lbl=tot>=1000000?(tot/1000000).toFixed(1)+'M':tot>=1000?Math.round(tot/1000)+'K':''+tot;
    ctx.fillStyle='#8B6914'; ctx.font='bold '+(devicePixelRatio>1?'8':'7')+'px sans-serif'; ctx.textAlign='center';
    ctx.fillText(lbl,x+bw/2,yBase-3);

  ctx.fillStyle='#A0805A'; ctx.font='7px sans-serif'; ctx.textAlign='center';
  for(let i=0;i<12;i++){ const x=padL+i*barW+bw/2+gap/2; ctx.fillText('T'+(i+1),x,padT+chartH+14); }
  ctx.strokeStyle='#E8D8A0'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(padL,padT+chartH); ctx.lineTo(W-padR,padT+chartH); ctx.stroke();
  const SWATCH=[
    `<svg width="12" height="12"><rect width="12" height="12" fill="#FDF0C0"/><circle cx="6" cy="6" r="2" fill="#8B6914"/></svg>`,
    `<svg width="12" height="12"><rect width="12" height="12" fill="#FFF8E7"/><line x1="0" y1="12" x2="12" y2="0" stroke="#5C3D00" stroke-width="1.5"/></svg>`,
    `<svg width="12" height="12"><rect width="12" height="12" fill="#EDD98A"/><line x1="0" y1="6" x2="12" y2="6" stroke="#5C3D00" stroke-width="1"/><line x1="6" y1="0" x2="6" y2="12" stroke="#5C3D00" stroke-width="1"/></svg>`,
    `<svg width="12" height="12"><rect width="12" height="12" fill="#FFF8E7"/><circle cx="6" cy="6" r="3" fill="#A07828"/></svg>`,
    `<svg width="12" height="12"><rect width="12" height="12" fill="#FDF0C0"/><line x1="0" y1="0" x2="12" y2="12" stroke="#8B6914" stroke-width="1.5"/></svg>`,
    `<svg width="12" height="12"><rect width="12" height="12" fill="#FFF8E7"/><line x1="0" y1="4" x2="12" y2="4" stroke="#5C3D00" stroke-width="1"/><line x1="0" y1="8" x2="12" y2="8" stroke="#5C3D00" stroke-width="1"/></svg>`,
  ];
  const legendHTML=activeCats.map((c,i)=>`<div class="legend-item"><div style="width:14px;height:14px;border:1px solid #D4B85A;border-radius:2px;overflow:hidden;flex-shrink:0;">${SWATCH[i%SWATCH.length]}</div>${c.name}</div>`).join('');
  const existing=document.getElementById('thien-chart-wrap'); if(existing) existing.remove();
  const wrap=document.createElement('div'); wrap.id='thien-chart-wrap';
  wrap.innerHTML=`<div class="thien-chart"><div class="thien-chart-title">Biểu đồ thiện pháp hàng tháng</div>${activeCats.length?`<div class="thien-chart-legend">${legendHTML}</div>`:''}</div>`;
  wrap.querySelector('.thien-chart').appendChild(canvas);
  canvas.addEventListener('click',e=>{ const rect=canvas.getBoundingClientRect(); const mi=Math.floor((e.clientX-rect.left-padL)/barW); if(mi>=0&&mi<12) jumpToThienMonth(mi); });
  document.getElementById('thien-banner').insertAdjacentElement('afterend',wrap);
}
function jumpToThienMonth(mi){}
function resetMonthData(){
  if(!confirm('Xóa toàn bộ dữ liệu '+MONTHS_VN[curMonth]+' '+curYear+'?')) return;
  delete data[mKey(curYear,curMonth)]; saveData(); renderMonth(); renderThien();
}

// ── PATCH 3: renderThien - monthly rows read from data, show note from slot ──
function renderThien(){
  document.getElementById('thien-title').textContent='Thiện Pháp — Năm '+thienYear;
  const grandYr=cats.reduce((s,c)=>s+catYearTotal(c.id,thienYear),0);
  const grandAll=cats.reduce((s,c)=>s+catAllTotal(c.id),0);
  document.getElementById('thien-sub').textContent=grandYr>0?'Tổng năm: '+fmtVND(grandYr):'';
  document.getElementById('thien-banner').innerHTML=grandAll>0?`<div class="thien-banner"><svg width="34" height="34" viewBox="0 0 40 40" fill="none"><ellipse cx="20" cy="26" rx="6" ry="10" fill="#EDD98A" opacity=".4"/><ellipse cx="11" cy="23" rx="6" ry="9" transform="rotate(-30 11 23)" fill="#EDD98A" opacity=".4"/><ellipse cx="29" cy="23" rx="6" ry="9" transform="rotate(30 29 23)" fill="#EDD98A" opacity=".4"/><ellipse cx="20" cy="26" rx="5" ry="9" fill="#EDD98A" opacity=".7"/></svg><div><div style="font-size:10px;color:#EDD98A;letter-spacing:.1em;font-weight:700;margin-bottom:2px;">TỔNG CỘNG DỒN TẤT CẢ THIỆN PHÁP</div><div style="font-size:26px;font-weight:800;color:#FFF8E7;font-family:Georgia,serif;">${fmtVND(grandAll)}</div>${grandYr<grandAll?`<div style="font-size:11px;color:#EDD98A;opacity:.8;margin-top:2px;">Năm ${thienYear}: ${fmtVND(grandYr)}</div>`:''}</div></div>`:'';
  const el=document.getElementById('thien-cats');
  el.innerHTML=cats.map(cat=>{
    const yt=catYearTotal(cat.id,thienYear), at=catAllTotal(cat.id);
    return `<div class="cat-card">
      <div class="cat-card-head" id="chead-${cat.id}" onclick="toggleCat('${cat.id}')">
        <div class="cat-icon">${cat.icon}</div>
        <div class="cat-info">
          <div class="cat-name">${cat.name}</div>
          <div class="cat-sub">Năm ${thienYear}: <strong style="color:${yt>0?'#8B6914':'#C8A84B'}">${yt>0?fmtVND(yt):'—'}</strong>${at>yt&&at>0?`&nbsp;· Cộng dồn: <strong style="color:#A0805A">${fmtVND(at)}</strong>`:''}</div>
        </div>
        <span style="font-size:12px;color:#C8A84B;margin-right:4px;">▼</span>
        <button style="background:none;border:none;cursor:pointer;color:#C8A84B;font-size:14px;padding:2px 4px;" onclick="event.stopPropagation();removeCat('${cat.id}')">✕</button>
      </div>
      <div class="cat-body" id="cbody-${cat.id}">
        ${Array.from({length:12},(_,mi)=>{
          const mk2=mKey(thienYear,mi);
          const monAmt=catMonthTotal(cat.id,mk2);
          // Collect items from data for this cat+month
          const monMd=data[mk2]||{};
          const monItems=[];
          const seen={};
          Object.keys(monMd).sort((a,b)=>Number(a)-Number(b)).forEach(day=>{
            const dd=monMd[day];
            if(!dd||typeof dd!=='object') return;
            Object.keys(dd).forEach(si=>{
              const slot=dd[si];
              if(!slot||typeof slot!=='object'||slot.catId!==cat.id||!slot.amount) return;
              const key=day+'-'+si; if(seen[key]) return; seen[key]=1;
              monItems.push({day:parseInt(day),note:slot.note||'',place:slot.place||'',amount:parseAmt(slot.amount)});
            });
          });
          const noteSummary=monItems.map(x=>[x.place,x.note].filter(Boolean).join(' · ')).filter(Boolean).join('; ');
          return `<div class="mon-row" onclick="toggleMonEdit('${cat.id}',${mi})">
            <div class="mon-name${monAmt>0?' has':''}">${MONTHS_VN[mi]}</div>
            <div class="mon-val${monAmt>0?' has':''}">${monAmt>0?fmtVND(monAmt):'—'}</div>
            ${noteSummary?`<div class="mon-note">${noteSummary}</div>`:''}
            <span style="font-size:11px;color:#C8A84B;">▼</span>
          </div>
          <div class="mon-edit" id="medit-${cat.id}-${mi}">
            ${monItems.length?monItems.map(item=>`<div style="grid-column:1/-1;display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px dashed #E8D8A0;">
              <div style="flex:1;font-size:12px;">
                <span style="font-weight:700;color:#8B6914;">Ngày ${item.day}</span>
                ${item.place?`<span style="color:#A0805A;"> · ${item.place}</span>`:''}
                ${item.note?`<div style="color:#888;font-style:italic;font-size:11px;">${item.note}</div>`:''}
              </div>
              <span style="font-size:12px;font-weight:700;color:#5C3D00;margin-left:8px;white-space:nowrap;">${fmtVND(item.amount)}</span>
            </div>`).join(''):`<div style="grid-column:1/-1;font-size:11px;color:#C8A84B;padding:6px 0;">Chưa có dữ liệu</div>`}
          </div>`;
        }).join('')}
        <div class="cat-footer">
          <div class="cat-footer-row">
            <span style="font-size:12px;font-weight:700;color:#5C3D00;">Tổng năm ${thienYear}</span>
            <span style="font-size:16px;font-weight:800;color:#8B6914;font-family:Georgia,serif;">${yt>0?fmtVND(yt):'—'}</span>
          </div>
          ${at>0?`<div class="cat-footer-row" style="margin-top:4px;"><span style="font-size:11px;color:#8B6914;">Cộng dồn tất cả</span><span style="font-size:13px;font-weight:700;color:#5C3D00;">${fmtVND(at)}</span></div>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('icon-grid').innerHTML=ICONS.map(ic=>`<button class="icon-btn${ic===selectedIcon?' sel':''}" onclick="selectIcon('${ic}')">${ic}</button>`).join('');
  renderThienChart();
}
function toggleCat(id){
  const head=document.getElementById('chead-'+id), body=document.getElementById('cbody-'+id);
  const open=body.classList.toggle('open'); head.classList.toggle('open',open);
  head.querySelector('span').textContent=open?'▲':'▼';
}
function toggleMonEdit(catId,mi){
  document.getElementById('medit-'+catId+'-'+mi).classList.toggle('open');
}
function updateThien(catId,mi,val,field){
  if(!thien[catId]) thien[catId]={};
  const mk2=mKey(thienYear,mi);
  if(!thien[catId][mk2]) thien[catId][mk2]={};
  thien[catId][mk2][field]=val; saveThien();
}
function removeCat(id){
  if(!confirm('Xóa đầu mục này?')) return;
  cats=cats.filter(c=>c.id!==id); saveCats(); renderThien();
}
function toggleAddCat(){
  const f=document.getElementById('add-cat-form');
  f.style.display=f.style.display==='none'?'block':'none';
}
function selectIcon(ic){
  selectedIcon=ic;
  document.querySelectorAll('.icon-btn').forEach(b=>b.classList.toggle('sel',b.textContent===ic));
}
function addCat(){
  const nm=document.getElementById('new-cat-name').value.trim(); if(!nm) return;
  cats.push({id:'cat-'+Date.now(),name:nm,icon:selectedIcon}); saveCats();
  document.getElementById('new-cat-name').value='';
  document.getElementById('add-cat-form').style.display='none';
  renderThien();
}
function showFlash(icon,name){
  document.getElementById('f-icon').textContent=icon||'🌸';
  document.getElementById('f-name').textContent=name||'';
  document.getElementById('flash').style.display='block';
}
function hideFlash(){ document.getElementById('flash').style.display='none'; }
function updateGrandTotal(){
  const gt=grandTotal();
  document.getElementById('grand-total').textContent=gt>0?'Tổng đã nhập: '+fmtVND(gt):'';
}
function renderAll(){ renderMonth(); renderYear(); renderThien(); updateGrandTotal(); }
load();
showTab('thien');
updateGrandTotal();
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
